{% extends 'game/base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto; padding: 20px;">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px;">
            Log In
        </button>
    </form>
</div>
{% endblock %}
