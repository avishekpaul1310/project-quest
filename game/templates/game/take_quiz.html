{% extends 'game/base.html' %}

{% block title %}{{ mission.title }} - Quiz{% endblock %}

{% block content %}
<h2 class="mb-4">{{ mission.title }}</h2>
<p class="lead mb-4">{{ mission.description }}</p>

<form method="post">
    {% csrf_token %}
    {% for question in questions %}
        <div class="question-card">
            <h4>{{ forloop.counter }}. {{ question.text }}</h4>
            <div class="options">
                <div class="form-check">
                    <input type="radio" name="question_{{ question.id }}" value="A" 
                           class="form-check-input" required>
                    <label class="form-check-label">{{ question.option_a }}</label>
                </div>
                <div class="form-check">
                    <input type="radio" name="question_{{ question.id }}" value="B" 
                           class="form-check-input">
                    <label class="form-check-label">{{ question.option_b }}</label>
                </div>
                <div class="form-check">
                    <input type="radio" name="question_{{ question.id }}" value="C" 
                           class="form-check-input">
                    <label class="form-check-label">{{ question.option_c }}</label>
                </div>
                <div class="form-check">
                    <input type="radio" name="question_{{ question.id }}" value="D" 
                           class="form-check-input">
                    <label class="form-check-label">{{ question.option_d }}</label>
                </div>
            </div>
        </div>
    {% endfor %}

    <div class="mt-4 mb-4">
        <button type="submit" class="btn btn-primary">Submit Answers</button>
        <a href="{% url 'game:dashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
    </div>
</form>
{% endblock %}
