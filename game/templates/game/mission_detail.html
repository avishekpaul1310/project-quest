{% extends 'game/base.html' %}

{% block title %}{{ mission.title }}{% endblock %}

{% block content %}
<div class="mission-container">
    <h1>{{ mission.title }}</h1>
    
    <div class="mission-content">
        <section class="mission-description">
            <h2>Mission Description</h2>
            <div class="content-box">
                {{ mission.description|linebreaks }}
            </div>
        </section>
    </div>
    
    <div class="action-container">
        {% if completed %}
            <div class="completion-message">
                <span class="completion-badge">✓ Mission Completed</span>
                <a href="{% url 'game:take_quiz' mission.id %}" class="retry-btn">Retry Quiz</a>
            </div>
        {% else %}
            <a href="{% url 'game:take_quiz' mission.id %}" class="start-quiz-btn">Start Quiz</a>
        {% endif %}
        
        <a href="{% url 'game:dashboard' %}" class="back-btn">Back to Dashboard</a>
    </div>
</div>
{% endblock %}
